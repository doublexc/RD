<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 100px;
            background-color: #f4f4f9;
            color: #333;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h2>กำลังพาท่านไปยังจุดหมาย...</h2>
    <p>ตรวจสอบท้ายลิ้งค์ต้องเป็น ?id=name</p>

    <script>
        (async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            
            // ถ้าไม่มี ID ให้หยุดทำงานและแสดงข้อความเตือน
            if (!id) {
                document.querySelector('h2').innerText = "ไม่พบรหัสลิงก์";
                return;
            }

            try {
                // ดึงข้อมูลจาก Google Sheets ของคุณ
                const response = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vQkTor2BGB5rV9i4fPjOKu39ocu_7e_fFXILbWFRJuxYeas4bsIHZAIGqoMyR6vLjf2Ei7dQhnMHYuR/pub?gid=461556905&single=true&output=csv');
                const data = await response.text();
                const rows = data.split('\n');

                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(',');
                    // เช็คว่า ID ตรงกันไหม (cols[0] คือช่อง A, cols[1] คือช่อง B)
                    if (cols[0] && cols[0].trim() === id.trim()) {
                        window.location.replace(cols[1].trim());
                        return;
                    }
                }
                
                // ถ้าวนหาจนจบแล้วไม่เจอ
                document.querySelector('h2').innerText = "ไม่พบข้อมูลลิงก์ในระบบ";
            } catch (e) {
                console.error(e);
                document.querySelector('h2').innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อ";
            }
        })();
    </script>
</body>
</html>
