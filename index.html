<script>
    (async function() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (!id) return;

        try {
            // ดึงข้อมูลจาก Google Sheets (ใส่ URL CSV ของคุณ)
            const response = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vQkTor2BGB5rV9i4fPjOKu39ocu_7e_fFXILbWFRJuxYeas4bsIHZAIGqoMyR6vLjf2Ei7dQhnMHYuR/pub?gid=461556905&single=true&output=csv');
            const data = await response.text();
            const rows = data.split('\n');

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',');
                if (cols[0] && cols[0].trim() === id.trim()) {
                    // ใช้ replace เพื่อข้ามหน้า history และทำงานทันที
                    window.location.replace(cols[1].trim());
                    return;
                }
            }
        } catch (e) {
            console.error(e);
        }
    })(); // ( ) ตอนท้ายคือให้ฟังก์ชันทำงานทันทีไม่ต้องรอ window.onload
</script>
