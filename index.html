<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h2 id="msg">กำลังพาท่านไปยังจุดหมาย...</h2>
    <p>ตรวจสอบท้ายลิ้งค์ต้องเป็น ?id=name</p>

    <script>
    (async function() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        
        if (!id) {
            document.getElementById('msg').innerText = "กรุณาระบุ ?id=... ที่ท้ายลิงก์";
            return;
        }

        
        const encodedUrl = 'aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvZS8yUEFDWC0xdlFrVG9yMkJHQjVyVjlpNGZQak9LdTM5b2N1XzdlX2ZGWElMYldGUkp1eFllYXM0YnNJSFpBSUdxb015UjZ2TGpmMkVpN2RRaG5NSFl1Ui9wdWI/Z2lkPTQ2MTU1NjkwNSZzaW5nbGU9dHJ1ZSZvdXRwdXQ9Y3N2...'; 
        const sheetUrl = atob(encodedUrl); 
        // ---------------------------

        let extraParams = "";
        urlParams.forEach((value, key) => {
            if (key !== 'id') {
                extraParams += `&${key}=${encodeURIComponent(value)}`;
            }
        });

        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            const rows = data.split('\n');

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',');
                if (cols[0] && cols[0].trim() === id.trim()) {
                    let targetUrl = cols[1].trim();
                    const separator = targetUrl.includes('?') ? '&' : '?';
                    const finalUrl = extraParams ? `${targetUrl}${separator}${extraParams.substring(1)}` : targetUrl;

                    window.location.replace(finalUrl);
                    return;
                }
            }
            document.getElementById('msg').innerText = "ไม่พบ ID นี้ในระบบ";
        } catch (e) {
            console.error(e);
            document.getElementById('msg').innerText = "เกิดข้อผิดพลาดในการดึงข้อมูล";
        }
    })();
</script>

</body>
</html>
